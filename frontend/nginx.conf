server {
    listen 80;
    server_name _;

    # 前端静态资源
    location /cybersec-training {
        alias /usr/share/nginx/html/cybersec-training;
        index index.html;
        try_files $uri $uri/ /cybersec-training/index.html;
    }

    # API 代理到后端
    location /api/ {
        proxy_pass http://cybersec-backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
