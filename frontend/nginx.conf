server {
    listen 80;
    server_name _;

    # 前端静态资源
    location /cybersec-training {
        alias /usr/share/nginx/html/cybersec-training;
        index index.html;
        try_files $uri $uri/ /cybersec-training/index.html;
    }

    # API 代理到后端（运行时解析，避免后端未启动时 nginx 崩溃）
    location /api/ {
        resolver 127.0.0.11 valid=30s ipv6=off;
        set $backend_upstream cybersec-backend:8080;
        proxy_pass http://$backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
