# 生产环境配置 - 用于 Railway 云端部署
# 使用 H2 内存数据库（云端无持久化存储，每次重启数据从 DataInitializer 重新初始化）
server:
  address: 0.0.0.0
  port: ${PORT:8080}

spring:
  datasource:
    url: jdbc:h2:mem:cybersec;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: never
  jpa:
    hibernate:
      ddl-auto: create
    defer-datasource-initialization: true
    show-sql: false
    properties:
      hibernate:
        format_sql: false

# DeepSeek AI配置（免费API，用于AI情景仿真实训）
# 使用步骤：
# 1. 访问 https://platform.deepseek.com/ 注册账号
# 2. 进入 API Keys 页面创建 Key
# 3. 将 Key 填入下方 api-key 或设置环境变量 DEEPSEEK_API_KEY
deepseek:
  api-key: ${DEEPSEEK_API_KEY:}
  enabled: true
  model: deepseek-chat
  base-url: https://api.deepseek.com/v1

logging:
  level:
    root: INFO
    org.springframework: WARN
